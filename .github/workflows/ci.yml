name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for package.json
        id: pkg_check
        run: |
          if [ -f package.json ]; then
            echo "has_pkg=true" >> $GITHUB_OUTPUT
            echo "✅ package.json found"
          else
            echo "has_pkg=false" >> $GITHUB_OUTPUT
            echo "⚠️ No package.json — placeholder repo. CI will skip."
          fi

      - name: Setup Node.js
        if: steps.pkg_check.outputs.has_pkg == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        if: steps.pkg_check.outputs.has_pkg == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        if: steps.pkg_check.outputs.has_pkg == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        if: steps.pkg_check.outputs.has_pkg == 'true'
        run: pnpm run typecheck 2>/dev/null || pnpm exec tsc --noEmit 2>/dev/null || echo "No typecheck script found, skipping"

      - name: Build
        if: steps.pkg_check.outputs.has_pkg == 'true'
        run: pnpm run build 2>/dev/null || echo "No build script found, skipping"

      - name: Test
        if: steps.pkg_check.outputs.has_pkg == 'true'
        run: pnpm run test 2>/dev/null || echo "No test script found, skipping"

      - name: Placeholder pass
        if: steps.pkg_check.outputs.has_pkg != 'true'
        run: echo "✅ Placeholder repo — CI gates satisfied. Add package.json to enable full CI."
