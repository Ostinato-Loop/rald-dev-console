name: Deploy — RALD Dev Console

on:
  push:
    branches: [main]

concurrency:
  group: deploy-rald-dev-console
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_RALD_AUTH_URL: https://auth.rald.cloud
          VITE_RALD_IDENTITY_URL: https://identity.rald.cloud

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: d5a1cd03b76f467430034af64a7062fd
          command: pages deploy dist --project-name=rald-dev-console --branch=main

      - name: Smoke test
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://console.rald.cloud)
          echo "console.rald.cloud → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠ Smoke test: expected 200, got $STATUS"
          fi

      - name: Audit log
        if: always()
        run: |
          echo "Deploy completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
